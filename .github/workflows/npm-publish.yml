name: NPM Publish

on:
  push:
    branches: ['master']

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.JS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 11.0.0-rc.1
          run_install: false

      - name: Get PNPM Store
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup PNPM Cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm pack --out authz.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: ./authz.tgz
  publish_npm:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Node.JS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 11.0.0-rc.1
          run_install: false
      - uses: actions/download-artifact@v4
        with:
          name: package
      - name: Publish to NPM.JS
        run: pnpm publish authz.tgz --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish_gh:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Node.JS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@cloud2go'

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 11.0.0-rc.1
          run_install: false
      - uses: actions/download-artifact@v4
        with:
          name: package
      - run: pnpm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to GitHub Packages
        run: pnpm publish authz.tgz --no-git-checks --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
