name: NPM Publish

on:
  push:
    branches: ['master']

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PNPM
        uses: pnpm/action-setup@v6
      - name: Setup Node.JS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: |
          [[ $(pnpm run | grep test) ]] && pnpm test || echo "No tests to run"
      - run: pnpm build
      - run: pnpm pack --out authz.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: ./authz.tgz
  publish_npm:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'
      - name: Setup Node.JS
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/download-artifact@v4
        with:
          name: package
      - name: Publish to NPM.JS
        run: pnpm publish authz.tgz --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish_gh:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'
      - name: Setup Node.JS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@cloud2go'
      - uses: actions/download-artifact@v4
        with:
          name: package
      - run: pnpm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to GitHub Packages
        run: pnpm publish authz.tgz --no-git-checks --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
